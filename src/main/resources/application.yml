spring:
  application:
    name: payment-api

  config:
    import:
      - "optional:aws-secretsmanager:payment-api/config"
      - "aws-parameterstore:/kan-cloud-platform/dev/"

  security:
    oauth2:
      resourceserver:
        jwt:
          # Sourced from SSM param /kan-cloud-platform/dev/cognito.issuer-uri
          issuer-uri: ${cognito.issuer-uri}

  cloud:
    aws:
      sqs:
        # The queue is provisioned by Terraform. Never let the app create it.
        queue-not-found-strategy: fail

app:
  queue-name: payment-api-queue

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
